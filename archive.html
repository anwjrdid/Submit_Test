<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전체 제출 아카이브</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DungGeunMo&display=swap" rel="stylesheet">
    <style>
        body { overflow-y: auto; padding: 50px 20px; flex-direction: column; justify-content: flex-start; }
        .archive-container { width: 100%; max-width: 900px; background: #1a1a1f; padding: 40px; border-radius: 20px; border: 3px solid #fca311; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { border-bottom: 2px solid #fca311; color: #fca311; padding: 15px; text-align: left; }
        td { border-bottom: 1px solid #333; padding: 15px; color: #fff; }
        .search-large { width: 100%; padding: 15px; font-size: 1.2rem; background: #000; border: 1px solid #555; color: #fff; font-family: 'DungGeunMo'; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="archive-container">
        <h1 style="color: #fca311; text-align: center; font-size: 2.5rem; margin-bottom: 30px;">📂 전체 제출 아카이브 📂</h1>
        <input type="text" id="archive-search" class="search-large" placeholder="학교 이름으로 검색하세요...">
        <table>
            <thead>
                <tr>
                    <th>순위</th>
                    <th>학교</th>
                    <th>이름</th>
                    <th>기록</th>
                    <th>포부</th>
                </tr>
            </thead>
            <tbody id="full-archive-list">
                </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 1. Supabase 초기화
    const _supabase = supabase.createClient('https://knkfkyzcrggxfzwomjgy.supabase.co', 'sb_publishable_yl6XC2nGGP0_BK0hhgxfww_MyxK0aOh');

    // 2. 통합 렌더링 함수 (하나만 남기기)
    async function renderArchive(keyword = "") {
        const list = document.getElementById('full-archive-list');
        list.innerHTML = '<tr><td colspan="5" style="text-align:center;">데이터 로딩 중...</td></tr>';

        // DB 쿼리 시작
        let query = _supabase
            .from('ranking')
            .select('*')
            .order('raw_time', { ascending: true });

        // 검색어가 있으면 필터링 (학교 이름 기준)
        if (keyword) {
            query = query.ilike('univ', `%${keyword}%`);
        }

        const { data, error } = await query;

        if (error) {
            console.error("데이터 로드 실패:", error);
            list.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">데이터를 가져오지 못했습니다.</td></tr>';
            return;
        }

        if (data.length === 0) {
            list.innerHTML = '<tr><td colspan="5" style="text-align:center;">제출된 기록이 없습니다.</td></tr>';
            return;
        }

        // 테이블 그리기
        list.innerHTML = '';
        data.forEach((item, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${idx + 1}</td>
                <td>${item.univ}</td>
                <td>${item.name}</td>
                <td style="color: #ff4d4d; font-weight:bold;">${item.clear_time}</td>
                <td style="color: #a8dadc;">${item.aspiration}</td>
            `;
            list.appendChild(tr);
        });
    }

    // 3. 이벤트 리스너 연결
    document.getElementById('archive-search').oninput = (e) => {
        renderArchive(e.target.value);
    };

    // 4. 페이지 로드 시 최초 실행
    window.onload = () => {
        renderArchive();
    };
</script>
</body>
</html>
